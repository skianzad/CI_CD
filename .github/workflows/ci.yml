name: CI

on:
  push:
    branches: 
      - main
      - dev
      - master
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show repo files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests

      - name: "Fake Success"
        run: echo "Fake successful comment"

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t myapp:V0.2 .
      
      - name: Run Container
        run: docker run -d -p 5000:5000 --name prod-container myapp:V0.2

      - name: "Access the website"
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:5000; then
              echo "App is up and running"
              exit 0
            fi
            echo "Waiting for the APP ..."
            sleep 2
          done

          echo "App failed to start"
          exit 1
      - name: Clear the Container
        if: always()
        run: docker stop prod-container && docker rm prod-container

